<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#090d16] text-white min-p-0 m-0">

    <div id="app" class="py-12 px-4 max-w-5xl mx-auto space-y-16 font-sans">
        <!-- El contenido dinámico se inyectará aquí -->
    </div>

    <script>
        /**
         * ARQUITECTURA CIELO EFATA - Motor Frontend Pro & Leads WhatsApp
         */
        const CONFIG = {
            supabaseUrl: 'https://xzjoruazhlwmaebnqqbv.supabase.co',
            supabaseKey: 'sb_publishable_AVcvj1Bq_uD7sYhbJZeHWA_NobPbVVF',
            appsScriptUrl: 'AQUÍ_PEGAS_TU_URL_DE_WEB_APP_APPS_SCRIPT' // Tu URL de Google Apps Script (Línea 19)
        };

        let db = null;
        try {
            if (window.supabase) {
                db = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
            }
        } catch (e) {
            console.warn("Modo offline activado.");
        }

        const App = {
            el: document.getElementById('app'),
            pasoActual: 0,
            puntaje: 0,
            nombreUsuario: '',
            whatsappUsuario: '',
            emailUsuario: '',
            preguntas: [
                "¿Sientes que tus reacciones ante el estrés son automáticas?",
                "¿Hay desconexión entre tus valores y tus decisiones diarias?",
                "¿Te sientes atrapado en pensamientos que no te pertenecen?",
                "¿El miedo determina tu toma de decisiones?",
                "¿Tu identidad está fragmentada por el entorno digital?",
                "¿Buscas validación externa para sentirte en paz?",
                "¿Reconoces la necesidad de una restauración profunda?"
            ],

            render: function() {
                if (!this.el) return;
                this.el.innerHTML = `
                    <!-- ENCABEZADO CON LOGO DE CIELO EFATA -->
                    <div class="text-center space-y-6">
                        <div class="flex justify-center">
                            <img src="https://i.ibb.co/twyTZ7Kz/logo-cieloefata.jpg" alt="Ministerio Cielo Efata" class="w-28 h-28 rounded-2xl border-2 border-purple-500 shadow-2xl object-cover">
                        </div>
                        <span class="px-4 py-1.5 rounded-full bg-purple-950/80 text-purple-300 border border-purple-800 text-xs font-black tracking-widest uppercase">Ministerio Cielo Efata</span>
                        <h1 class="text-4xl md:text-6xl font-black text-white uppercase tracking-tighter">¿Tus emociones te controlan?</h1>
                        <p class="text-base md:text-xl text-purple-200/80 max-w-2xl mx-auto italic">La encrucijada crítica entre tu neurobiología y tu diseño divino original.</p>
                    </div>

                    <!-- CONTENEDOR DE LA EVALUACIÓN -->
                    <div id="evaluacion-container" class="bg-gradient-to-br from-[#0f172a] via-[#111827] to-black p-8 md:p-12 rounded-[2.5rem] border border-purple-500/20 shadow-2xl text-center">
                        <div id="evaluacion-content" class="space-y-6">
                            <div class="max-w-xl mx-auto space-y-6">
                                <input type="text" id="input-nombre" placeholder="Escribe tu nombre completo..." class="w-full bg-black/60 border border-purple-500/30 p-5 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 text-lg shadow-inner">
                                <button id="start-btn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-black py-5 rounded-2xl tracking-wider uppercase shadow-[0_0_30px_rgba(147,51,234,0.4)] transition-all text-lg cursor-pointer">
                                    Iniciar Evaluación Profesional
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- CREDENCIALES Y AUTORIDAD -->
                    <div class="grid md:grid-cols-3 gap-8 items-center bg-gradient-to-br from-[#0a0f1d] to-black p-8 md:p-10 rounded-[2.5rem] border border-white/10">
                        <div class="flex justify-center">
                            <a href="https://ibb.co/8nbkQ2Q0" target="_blank">
                                <img src="https://i.ibb.co/qLC6292d/perfil-lkin.png" class="w-48 h-48 rounded-2xl border-2 border-purple-500 shadow-2xl object-cover" alt="Dr. Alejandro Sirit">
                            </a>
                        </div>
                        <div class="md:col-span-2 space-y-4 text-left">
                            <h3 class="text-3xl font-extrabold text-white">Dr. Alejandro Sirit</h3>
                            <p class="text-xs text-amber-400 font-bold uppercase tracking-widest">Doctor Honoris Causa (Centro UNESCO) | IBM Data Scientist and Data Analytics IBM Certified</p>
                            <p class="text-gray-300 text-sm leading-relaxed">
                                Más de 30 años de trayectoria integrando la neurociencia, la exégesis y la gobernanza ética de la Inteligencia Artificial.
                            </p>
                        </div>
                    </div>

                    <!-- VITRINA DE OBRAS CON TODAS LAS PORTADAS -->
                    <div class="space-y-6 text-center">
                        <h3 class="text-xs font-bold uppercase tracking-[0.3em] text-purple-400">Obras Exegéticas del Autor</h3>
                        <div class="grid grid-cols-2 sm:grid-cols-5 gap-4">
                           <div class="rounded-2xl overflow-hidden border border-white/10 shadow-lg aspect-[2/3] bg-black/40 p-2"><img src="https://i.ibb.co/h1c2rwDM/la-fe-no-basta-1.png" class="w-full h-full object-cover rounded-xl"></div>
                           <div class="rounded-2xl overflow-hidden border border-white/10 shadow-lg aspect-[2/3] bg-black/40 p-2"><img src="https://i.ibb.co/8ntN4b4b/libro-espejo.png" class="w-full h-full object-cover rounded-xl"></div>
                           <div class="rounded-2xl overflow-hidden border border-white/10 shadow-lg aspect-[2/3] bg-black/40 p-2"><img src="https://i.ibb.co/bgBBCXm9/libro-cielo.png" class="w-full h-full object-cover rounded-xl"></div>
                           <div class="rounded-2xl overflow-hidden border border-white/10 shadow-lg aspect-[2/3] bg-black/40 p-2"><img src="https://i.ibb.co/Xxs70K0L/libro-callar.png" class="w-full h-full object-cover rounded-xl"></div>
                           <div class="rounded-2xl overflow-hidden border border-white/10 shadow-lg aspect-[2/3] bg-black/40 p-2 sm:col-span-1 col-span-2"><img src="https://i.ibb.co/k2JtzT5W/libro-golgota.png" class="w-full h-full object-cover rounded-xl"></div>
                        </div>
                    </div>

                    <!-- PIE DE PÁGINA -->
                    <div class="text-center pt-8 border-t border-white/10 space-y-4">
                        <p class="text-xs uppercase tracking-widest text-gray-400">Proyecto Impulsado por</p>
                        <div class="flex justify-center">
                            <a href="https://ibb.co/jZBjbdb2" target="_blank">
                                <img src="https://i.ibb.co/5xtJGdGy/xtrametrik-black-blue.jpg" alt="Xtrametrik" class="h-12 rounded-xl object-contain border border-white/10">
                            </a>
                        </div>
                    </div>
                `;
                document.getElementById('start-btn').addEventListener('click', () => this.validarInicio());
            },

            validarInicio: function() {
                const input = document.getElementById('input-nombre');
                if (!input || !input.value.trim()) {
                    alert("Por favor, introduce tu nombre completo.");
                    return;
                }
                this.nombreUsuario = input.value.trim();
                this.pasoActual = 0;
                this.puntaje = 0;
                this.renderPregunta();
            },

            renderPregunta: function() {
                const container = document.getElementById('evaluacion-content');
                const q = this.preguntas[this.pasoActual];
                const progress = Math.round(((this.pasoActual + 1) / this.preguntas.length) * 100);

                container.innerHTML = `
                    <div class="space-y-6 max-w-xl mx-auto">
                        <div class="flex justify-between text-xs font-bold text-purple-400 uppercase tracking-widest">
                            <span>Pregunta ${this.pasoActual + 1} de ${this.preguntas.length}</span>
                            <span>${progress}%</span>
                        </div>
                        <div class="w-full h-2 bg-black/60 rounded-full overflow-hidden">
                            <div class="h-full bg-purple-600 transition-all duration-300" style="width: ${progress}%"></div>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-extrabold text-white leading-snug">${q}</h2>
                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <button onclick="App.responder(true)" class="p-5 rounded-2xl bg-purple-900/40 border border-purple-500/40 hover:bg-purple-800 text-white font-bold text-lg uppercase transition-all cursor-pointer">Sí / Casi siempre</button>
                            <button onclick="App.responder(false)" class="p-5 rounded-2xl bg-black/40 border border-white/10 hover:bg-gray-800 text-gray-300 font-bold text-lg uppercase transition-all cursor-pointer">No / Rara vez</button>
                        </div>
                    </div>
                `;
            },

            responder: function(esSi) {
                if (esSi) this.puntaje++;
                this.pasoActual++;
                if (this.pasoActual < this.preguntas.length) {
                    this.renderPregunta();
                } else {
                    this.renderCapturaDatos();
                }
            },

            renderCapturaDatos: function() {
                const container = document.getElementById('evaluacion-content');
                container.innerHTML = `
                    <div class="space-y-6 max-w-xl mx-auto text-left">
                        <h2 class="text-3xl font-black text-white uppercase text-center">Evaluación Concluida</h2>
                        <p class="text-gray-300 text-center">Introduce tus datos de contacto para desbloquear tu <b>Informe Profundo y Comparativo</b> en pantalla y recibir tu Guía.</p>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-xs uppercase font-bold text-purple-400">Correo Electrónico *</label>
                                <input type="email" id="input-email" placeholder="tu.correo@dominio.com" class="w-full mt-1 bg-black/60 border border-purple-500/30 p-4 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 text-base">
                            </div>
                            <div>
                                <label class="text-xs uppercase font-bold text-purple-400">WhatsApp (con código de país) *</label>
                                <input type="text" id="input-whatsapp" placeholder="+58 412 0000000" class="w-full mt-1 bg-black/60 border border-purple-500/30 p-4 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 text-base">
                            </div>
                        </div>

                        <button onclick="App.procesarInformeYGuardar()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black py-5 rounded-2xl uppercase tracking-wider shadow-lg transition-all text-lg cursor-pointer mt-4">
                            Ver mi Informe Profundo y Enviar Guía
                        </button>
                    </div>
                `;
            },

            procesarInformeYGuardar: async function() {
                const emailInput = document.getElementById('input-email').value.trim();
                const wppInput = document.getElementById('input-whatsapp').value.trim();

                if (!emailInput || !emailInput.includes('@') || !wppInput) {
                    alert("Por favor, introduce un correo válido y tu número de WhatsApp para continuar.");
                    return;
                }

                this.emailUsuario = emailInput;
                this.whatsappUsuario = wppInput;

                // 1. Guardar en Supabase
                if (db) {
                    try {
                        await db.from('leads_cieloefata').insert([{
                            nombre: this.nombreUsuario,
                            email: this.emailUsuario,
                            whatsapp: this.whatsappUsuario,
                            puntaje_fractura: this.puntaje,
                            estado_diagnostico: this.puntaje > 4 ? "Fractura Sistémica" : "Disonancia Cognitiva"
                        }]);
                    } catch (err) {
                        console.error("Error al registrar en Supabase:", err);
                    }
                }

                // 2. Disparar Google Apps Script para el envío del correo de la Guía
                if (CONFIG.appsScriptUrl && CONFIG.appsScriptUrl !== 'AQUÍ_PEGAS_TU_URL_DE_WEB_APP_APPS_SCRIPT') {
                    try {
                        fetch(CONFIG.appsScriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nombre: this.nombreUsuario,
                                email: this.emailUsuario,
                                whatsapp: this.whatsappUsuario,
                                puntaje: this.puntaje
                            })
                        });
                    } catch (e) {
                        console.error("Error al conectar con Apps Script:", e);
                    }
                }

                // 3. Renderizar el Informe Profundo y Comparativo en Pantalla
                this.renderInformeFinal();
            },

            renderInformeFinal: function() {
                const container = document.getElementById('evaluacion-content');
                const esFractura = this.puntaje > 4;

                container.innerHTML = `
                    <div class="space-y-10 animate-fade-in text-left">
                        <div class="text-center space-y-3 border-b border-white/10 pb-6">
                            <span class="px-4 py-1.5 rounded-full bg-emerald-950 text-emerald-300 border border-emerald-800 text-xs font-black tracking-widest uppercase">Informe Generado con Éxito para ${this.nombreUsuario}</span>
                            <h2 class="text-3xl md:text-4xl font-black text-white uppercase">Informe Profundo y Comparativo</h2>
                            <p class="text-purple-300 italic text-sm">Dr. Alejandro Sirit — Ministerio Cielo Efata & XtraMetrik</p>
                        </div>

                        <!-- 1. NEUROCIENCIA -->
                        <div class="bg-black/40 p-6 rounded-2xl border border-white/10 space-y-2">
                            <h3 class="text-lg font-bold text-amber-400 uppercase tracking-wide">1. Perspectiva Neurocientífica</h3>
                            <p class="text-gray-300 text-sm leading-relaxed">
                                ${esFractura ? 
                                "Tus resultados indican un **secuestro amigdalino prolongado**. La corteza prefrontal ha cedido el control ante patrones de estrés autómata, lo que genera fatiga sináptica y respuestas reactivas automáticas ante la incertidumbre." : 
                                "Muestras un nivel moderado de calibración prefrontal, aunque existen micro-desconexiones neuronales recurrentes ante los estímulos digitales y las demandas del entorno."}
                            </p>
                        </div>

                        <!-- 2. EXÉGESIS -->
                        <div class="bg-black/40 p-6 rounded-2xl border border-white/10 space-y-2">
                            <h3 class="text-lg font-bold text-purple-400 uppercase tracking-wide">2. Análisis Exegético</h3>
                            <p class="text-gray-300 text-sm leading-relaxed">
                                Desde la exégesis de la identidad, la fractura actual refleja una división interna ("el altar del espejo"). Intentar conciliar la validación del entorno con el propósito divino genera una disonancia sistémica que agota los recursos espirituales y mentales del individuo.
                            </p>
                        </div>

                        <!-- 3. ANTROPOLOGÍA -->
                        <div class="bg-black/40 p-6 rounded-2xl border border-white/10 space-y-2">
                            <h3 class="text-lg font-bold text-sky-400 uppercase tracking-wide">3. Dimensión Antropológica</h3>
                            <p class="text-gray-300 text-sm leading-relaxed">
                                El ser humano contemporáneo ha mutado su identidad ontológica hacia la hiperconectividad algorítmica. Antropológicamente, la pérdida de silencio y contemplación despoja al individuo de su centro, convirtiéndolo en un espectador pasivo de su propia existencia.
                            </p>
                        </div>

                        <!-- 4. TEOLOGÍA BÍBLICA -->
                        <div class="bg-black/40 p-6 rounded-2xl border border-white/10 space-y-2">
                            <h3 class="text-lg font-bold text-emerald-400 uppercase tracking-wide">4. Teología Bíblica y Soberanía</h3>
                            <p class="text-gray-300 text-sm leading-relaxed">
                                La Escritura es categórica: <em>"No os conforméis a este siglo, sino transformaos por medio de la renovación de vuestro entendimiento"</em> (Romanos 12:2). La verdadera restauración no surge de la optimización humana, sino del sometimiento absoluto de la mente bajo la majestad y soberanía de Cristo.
                            </p>
                        </div>

                        <div class="bg-purple-950/40 p-6 rounded-2xl border border-purple-500/30 text-center space-y-4">
                            <p class="text-white font-bold">Hemos enviado la Guía de Restauración completa a <span class="text-purple-300">${this.emailUsuario}</span> y registrado tu WhatsApp (<span class="text-purple-300">${this.whatsappUsuario}</span>).</p>
                            <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-xl font-bold uppercase tracking-wider transition-all cursor-pointer text-sm">
                                Realizar Nueva Evaluación
                            </button>
                        </div>
                    </div>
                `;
            }
        };

        window.onload = () => App.render();
    </script>
</body>
</html>
